      <text x="18" y="204">Spotify.exe</text><rect x="18" y="214" width="360" height="9" rx="5" fill="#e8edf2"/><rect x="18" y="214" width="94" height="9" rx="5" fill="#0f766e"/><text x="420" y="223" text-anchor="end" fill="#667085">2.2h</text>

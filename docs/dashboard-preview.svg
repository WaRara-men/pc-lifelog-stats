      <rect x="344" y="0" width="76" height="56" rx="7" fill="#86c7bd" stroke="#d9dee7"/><text x="352" y="18" fill="#667085">5</text><text x="352" y="42" font-weight="700" fill="#1c2430">6.1h</text>
      <rect x="430" y="0" width="76" height="56" rx="7" fill="#f8fafc" stroke="#d9dee7"/><text x="438" y="18" fill="#667085">6</text><text x="438" y="42" font-weight="700" fill="#a0a7b2">0.0h</text>
      <rect x="516" y="0" width="76" height="56" rx="7" fill="#e2f0ec" stroke="#d9dee7"/><text x="524" y="18" fill="#667085">7</text><text x="524" y="42" font-weight="700" fill="#1c2430">2.8h</text>
      <rect x="0" y="66" width="76" height="56" rx="7" fill="#d9e7f4" stroke="#d9dee7"/><text x="8" y="84" fill="#667085">8</text><text x="8" y="108" font-weight="700" fill="#1c2430">3.7h</text>
      <rect x="86" y="66" width="76" height="56" rx="7" fill="#bde0d7" stroke="#d9dee7"/><text x="94" y="84" fill="#667085">9</text><text x="94" y="108" font-weight="700" fill="#1c2430">4.9h</text>
      <rect x="172" y="66" width="76" height="56" rx="7" fill="#f8fafc" stroke="#d9dee7"/><text x="180" y="84" fill="#667085">10</text><text x="180" y="108" font-weight="700" fill="#a0a7b2">0.0h</text>
      <rect x="258" y="66" width="76" height="56" rx="7" fill="#e0eee9" stroke="#d9dee7"/><text x="266" y="84" fill="#667085">11</text><text x="266" y="108" font-weight="700" fill="#1c2430">2.6h</text>
      <rect x="344" y="66" width="76" height="56" rx="7" fill="#d1e8e1" stroke="#d9dee7"/><text x="352" y="84" fill="#667085">12</text><text x="352" y="108" font-weight="700" fill="#1c2430">3.8h</text>
    </g>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" transform="translate(736 424)">
    <rect width="478" height="244" rx="8" fill="#ffffff" stroke="#d9dee7"/>
    <text x="18" y="36" font-size="18" font-weight="700" fill="#1c2430">アプリ別</text>
    <g font-size="14" fill="#1c2430">
      <text x="18" y="72">Code.exe</text><rect x="18" y="82" width="360" height="9" rx="5" fill="#e8edf2"/><rect x="18" y="82" width="360" height="9" rx="5" fill="#0f766e"/><text x="420" y="91" text-anchor="end" fill="#667085">8.4h</text>

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">PC Lifelog Stats dashboard preview</title>
  <desc id="desc">A mock preview of the PC Lifelog Stats dashboard with summary cards, insights, a calendar heatmap, and app rankings.</desc>
  <rect width="1280" height="720" fill="#f4f6f8"/>
  <rect width="1280" height="88" fill="#ffffff"/>
  <line x1="0" y1="88" x2="1280" y2="88" stroke="#d9dee7"/>
  <text x="32" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#1c2430">PCライフログ統計</text>
  <text x="32" y="66" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#667085">ActivityWatchから読み取り専用で集計</text>
  <rect x="880" y="27" width="108" height="38" rx="7" fill="#ffffff" stroke="#d9dee7"/>
  <text x="902" y="51" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#1c2430">直近7日</text>
  <rect x="1000" y="27" width="62" height="38" rx="7" fill="#0f766e"/>
  <text x="1016" y="51" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">更新</text>
  <text x="1180" y="51" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#667085">更新 09:42</text>

  <rect x="66" y="118" width="1148" height="44" rx="7" fill="#fff7ed"/>
  <rect x="66" y="118" width="4" height="44" fill="#c2410c"/>
  <text x="84" y="146" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#7c2d12">Android同期後は、PCとスマホの使用時間をこの画面で合算できます。</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(66 184)">
      <rect width="276" height="126" rx="8" fill="#ffffff" stroke="#d9dee7"/>
      <text x="18" y="31" font-size="13" fill="#667085">今日の合計</text>
      <text x="18" y="80" font-size="36" font-weight="800" fill="#1c2430">4.32h</text>
      <text x="18" y="106" font-size="13" fill="#667085">PC + Android</text>
    </g>
    <g transform="translate(358 184)">
      <rect width="276" height="126" rx="8" fill="#ffffff" stroke="#d9dee7"/>
      <text x="18" y="31" font-size="13" fill="#667085">期間合計</text>
      <text x="18" y="80" font-size="36" font-weight="800" fill="#1c2430">28.6h</text>
      <text x="18" y="106" font-size="13" fill="#667085">7日分</text>
    </g>
    <g transform="translate(650 184)">
      <rect width="276" height="126" rx="8" fill="#ffffff" stroke="#d9dee7"/>
      <text x="18" y="31" font-size="13" fill="#667085">1日平均</text>
      <text x="18" y="80" font-size="36" font-weight="800" fill="#1c2430">4.08h</text>
      <text x="18" y="106" font-size="13" fill="#667085">中央値 3.92h</text>
    </g>
    <g transform="translate(942 184)">
      <rect width="276" height="126" rx="8" fill="#ffffff" stroke="#d9dee7"/>
      <text x="18" y="31" font-size="13" fill="#667085">最大の日</text>
      <text x="18" y="80" font-size="36" font-weight="800" fill="#1c2430">6.10h</text>
      <text x="18" y="106" font-size="13" fill="#667085">使いすぎ検知の基準にできる</text>
    </g>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(66 330)">
      <rect width="376" height="72" rx="8" fill="#ffffff" stroke="#d9dee7"/>
      <text x="16" y="28" font-size="15" font-weight="700" fill="#1c2430">今月の記録日 18/21</text>
      <text x="16" y="52" font-size="13" fill="#667085">記録がある日数。習慣の途切れ方が見える。</text>
    </g>
    <g transform="translate(452 330)">
      <rect width="376" height="72" rx="8" fill="#ffffff" stroke="#d9dee7"/>
      <text x="16" y="28" font-size="15" font-weight="700" fill="#1c2430">ピーク時間 21:00台</text>
      <text x="16" y="52" font-size="13" fill="#667085">集中/だらだらの山を探す入口。</text>
    </g>
    <g transform="translate(838 330)">
      <rect width="376" height="72" rx="8" fill="#ffffff" stroke="#d9dee7"/>
      <text x="16" y="28" font-size="15" font-weight="700" fill="#1c2430">主役アプリ Code.exe</text>
      <text x="16" y="52" font-size="13" fill="#667085">期間内でいちばん長く前面にいたアプリ。</text>
    </g>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" transform="translate(66 424)">
    <rect width="650" height="244" rx="8" fill="#ffffff" stroke="#d9dee7"/>
    <text x="18" y="36" font-size="18" font-weight="700" fill="#1c2430">月間カレンダー</text>
    <text x="500" y="36" font-size="12" fill="#667085">色が濃いほど使用時間が長い</text>
    <text x="18" y="66" font-size="13" fill="#667085">2026-06　最大 6.10h　緑: PC / 紫: Android</text>

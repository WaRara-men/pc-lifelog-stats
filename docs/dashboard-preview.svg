      <rect x="86" y="0" width="76" height="56" rx="7" fill="#d6ece6" stroke="#d9dee7"/><text x="94" y="18" fill="#667085">2</text><text x="94" y="42" font-weight="700" fill="#1c2430">3.4h</text>

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">PC Lifelog Stats hero preview</title>
  <desc id="desc">A polished preview showing PC and Android screen time flowing into one local dashboard with calendar, rankings, QR pairing, and Wi-Fi sync.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset=".55" stop-color="#10273b"/>
      <stop offset="1" stop-color="#0b3b35"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity=".28"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#020617" flood-opacity=".16"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M0 560 C180 496 280 604 448 540 C632 470 700 330 870 364 C1044 399 1078 540 1280 480 L1280 720 L0 720 Z" fill="#0f766e" opacity=".16"/>
  <path d="M0 96 C230 178 332 56 512 120 C690 184 760 250 960 182 C1102 134 1174 92 1280 132 L1280 0 L0 0 Z" fill="#7c3aed" opacity=".10"/>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="64" y="76" font-size="18" font-weight="700" fill="#99f6e4">LOCAL-FIRST SCREEN TIME LAB</text>
    <text x="64" y="130" font-size="46" font-weight="850" fill="#f8fafc">PC Lifelog Stats</text>
    <text x="64" y="172" font-size="21" fill="#cbd5e1">PCとAndroidの使用時間を、ひとつの画面で。</text>

    <g transform="translate(64 206)">
      <rect width="136" height="34" rx="17" fill="#ecfdf5" opacity=".96"/>
      <circle cx="22" cy="17" r="6" fill="#10b981">
        <animate attributeName="opacity" values=".45;1;.45" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <text x="39" y="22" font-size="14" font-weight="700" fill="#064e3b">Android ONLINE</text>
    </g>
    <g transform="translate(214 206)">
      <rect width="146" height="34" rx="17" fill="#eef2ff" opacity=".96"/>
      <text x="18" y="22" font-size="14" font-weight="700" fill="#3730a3">QR once, sync forever</text>
    </g>
    <g transform="translate(374 206)">
      <rect width="122" height="34" rx="17" fill="#f1f5f9" opacity=".96"/>
      <text x="18" y="22" font-size="14" font-weight="700" fill="#334155">No cloud</text>
    </g>
  </g>

  <g transform="translate(62 282)" filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <rect width="828" height="372" rx="18" fill="url(#panel)"/>
    <rect width="828" height="56" rx="18" fill="#ffffff"/>
    <path d="M0 38 Q0 0 18 0 L810 0 Q828 0 828 18 L828 56 L0 56 Z" fill="#ffffff"/>
    <circle cx="28" cy="28" r="6" fill="#ef4444"/>
    <circle cx="50" cy="28" r="6" fill="#f59e0b"/>
    <circle cx="72" cy="28" r="6" fill="#22c55e"/>
    <text x="108" y="34" font-size="15" font-weight="700" fill="#334155">PCライフログ統計</text>
    <rect x="650" y="14" width="84" height="28" rx="8" fill="#f8fafc" stroke="#d9dee7"/>
    <text x="667" y="33" font-size="12" fill="#475569">直近7日</text>
    <rect x="746" y="14" width="56" height="28" rx="8" fill="#0f766e"/>
    <text x="761" y="33" font-size="12" font-weight="700" fill="#ffffff">更新</text>

    <g transform="translate(28 82)">
      <rect width="178" height="92" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="16" y="29" font-size="13" fill="#64748b">今日の合計</text>
      <text x="16" y="68" font-size="33" font-weight="850" fill="#0f172a">4.27h</text>
      <text x="110" y="68" font-size="13" fill="#7c3aed">PC + Android</text>
    </g>
    <g transform="translate(222 82)">
      <rect width="178" height="92" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="16" y="29" font-size="13" fill="#64748b">期間合計</text>
      <text x="16" y="68" font-size="33" font-weight="850" fill="#0f172a">11.73h</text>
      <text x="118" y="68" font-size="13" fill="#64748b">7日</text>
    </g>
    <g transform="translate(416 82)">
      <rect width="178" height="92" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="16" y="29" font-size="13" fill="#64748b">ピーク時間</text>
      <text x="16" y="68" font-size="33" font-weight="850" fill="#0f172a">22:00</text>
    </g>
    <g transform="translate(610 82)">
      <rect width="178" height="92" rx="12" fill="#ecfdf5" stroke="#99f6e4"/>
      <text x="16" y="29" font-size="13" fill="#047857">接続</text>
      <text x="16" y="68" font-size="28" font-weight="850" fill="#064e3b">ONLINE</text>
    </g>

    <g transform="translate(28 198)">
      <text x="0" y="0" font-size="17" font-weight="800" fill="#0f172a">月間カレンダー</text>
      <text x="0" y="24" font-size="12" fill="#64748b">色が濃いほど、画面と過ごした日。</text>
      <g transform="translate(0 42)">
        <rect x="0" y="0" width="54" height="44" rx="8" fill="#e8f3f0" stroke="#e2e8f0"/>
        <rect x="64" y="0" width="54" height="44" rx="8" fill="#d6ece6" stroke="#e2e8f0"/>
        <rect x="128" y="0" width="54" height="44" rx="8" fill="#9ed4ca" stroke="#e2e8f0"/>
        <rect x="192" y="0" width="54" height="44" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
        <rect x="256" y="0" width="54" height="44" rx="8" fill="#86c7bd" stroke="#e2e8f0"/>
        <rect x="320" y="0" width="54" height="44" rx="8" fill="#efeafa" stroke="#e2e8f0"/>
        <rect x="384" y="0" width="54" height="44" rx="8" fill="#ddd6fe" stroke="#e2e8f0"/>
        <rect x="0" y="54" width="54" height="44" rx="8" fill="#bde0d7" stroke="#e2e8f0"/>
        <rect x="64" y="54" width="54" height="44" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
        <rect x="128" y="54" width="54" height="44" rx="8" fill="#c7e3dc" stroke="#e2e8f0"/>
        <rect x="192" y="54" width="54" height="44" rx="8" fill="#8bcfbd" stroke="#e2e8f0"/>
        <rect x="256" y="54" width="54" height="44" rx="8" fill="#ede9fe" stroke="#e2e8f0"/>
        <rect x="320" y="54" width="54" height="44" rx="8" fill="#d6ece6" stroke="#e2e8f0"/>
        <rect x="384" y="54" width="54" height="44" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
        <g fill="#334155" font-size="12" font-weight="700">
          <text x="10" y="28">2.1h</text><text x="74" y="28">3.4h</text><text x="138" y="28">4.8h</text><text x="266" y="28">6.1h</text>
          <text x="330" y="28">1.5h</text><text x="394" y="28">2.8h</text><text x="10" y="82">4.9h</text><text x="138" y="82">3.2h</text>
          <text x="202" y="82">5.6h</text><text x="266" y="82">1.2h</text><text x="330" y="82">3.0h</text>
        </g>
      </g>
    </g>

    <g transform="translate(506 198)">
      <text x="0" y="0" font-size="17" font-weight="800" fill="#0f172a">アプリ別</text>
      <text x="0" y="24" font-size="12" fill="#64748b">PCとAndroidが同じランキングに並ぶ。</text>
      <g transform="translate(0 48)" font-size="13">
        <text x="0" y="0" fill="#334155">Code.exe</text>
        <rect x="0" y="10" width="244" height="10" rx="5" fill="#e2e8f0"/>
        <rect x="0" y="10" width="224" height="10" rx="5" fill="#0f766e"/>
        <text x="270" y="19" fill="#64748b" text-anchor="end">8.4h</text>
        <text x="0" y="45" fill="#334155">Android: Browser</text>
        <rect x="0" y="55" width="244" height="10" rx="5" fill="#e2e8f0"/>
        <rect x="0" y="55" width="162" height="10" rx="5" fill="#7c3aed"/>
        <text x="270" y="64" fill="#64748b" text-anchor="end">4.3h</text>
        <text x="0" y="90" fill="#334155">msedge.exe</text>
        <rect x="0" y="100" width="244" height="10" rx="5" fill="#e2e8f0"/>
        <rect x="0" y="100" width="138" height="10" rx="5" fill="#0f766e"/>
        <text x="270" y="109" fill="#64748b" text-anchor="end">3.6h</text>
      </g>
    </g>
  </g>

  <g transform="translate(932 170)" filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <rect width="244" height="484" rx="34" fill="#111827"/>
    <rect x="13" y="14" width="218" height="456" rx="26" fill="#f8fafc"/>
    <rect x="74" y="28" width="96" height="8" rx="4" fill="#111827" opacity=".22"/>
    <text x="32" y="70" font-size="17" font-weight="800" fill="#0f172a">PC Lifelog Sender</text>
    <text x="32" y="96" font-size="12" fill="#64748b">QR is no longer needed</text>

    <rect x="32" y="122" width="180" height="74" rx="14" fill="#ecfdf5" stroke="#99f6e4"/>
    <circle cx="57" cy="158" r="8" fill="#10b981">
      <animate attributeName="r" values="7;10;7" dur="1.7s" repeatCount="indefinite"/>
    </circle>
    <text x="77" y="152" font-size="12" fill="#047857">paired OK</text>
    <text x="77" y="174" font-size="18" font-weight="850" fill="#064e3b">Auto sync ON</text>

    <rect x="32" y="216" width="180" height="74" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="50" y="247" font-size="12" fill="#64748b">Usage access</text>
    <text x="50" y="272" font-size="22" font-weight="850" fill="#0f172a">OK</text>

    <rect x="32" y="310" width="180" height="94" rx="14" fill="#eef2ff" stroke="#c4b5fd"/>
    <text x="50" y="342" font-size="12" fill="#6d28d9">next Wi-Fi sync</text>
    <text x="50" y="371" font-size="28" font-weight="850" fill="#4c1d95">15 min</text>

    <rect x="32" y="424" width="180" height="32" rx="16" fill="#0f766e"/>
    <text x="84" y="445" font-size="13" font-weight="800" fill="#ffffff">Sync now</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <path d="M890 472 C930 458 930 385 964 370" fill="none" stroke="#99f6e4" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10">
      <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <rect x="814" y="427" width="122" height="44" rx="22" fill="#f8fafc" filter="url(#soft)"/>
    <text x="838" y="455" font-size="14" font-weight="800" fill="#0f172a">Wi-Fi sync</text>
  </g>
</svg>
